<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Clawd Controls</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#fff7fa; color:#59473f; }
    .wrap { padding:10px; display:flex; flex-direction:column; gap:8px; }
    .row { display:flex; gap:8px; }
    input { flex:1; border:none; border-radius:10px; padding:9px 10px; background:#fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06); font-size:12px; }
    button { border:none; border-radius:10px; padding:9px 10px; background:#ff9db4; color:#fff; font-weight:600; cursor:pointer; font-size:12px; }
    #voice { width:100%; }
    #status { min-height:16px; font-size:11px; color:#8a6f66; }
  </style>
</head>
<body>
  <div class="wrap">
    <input id="input" placeholder="直接对她说话，或输入任务…" maxlength="200" />
    <div class="row">
      <button id="voice">🎙 语音</button>
    </div>
    <div id="status"></div>
  </div>
  <script>
    const input = document.getElementById('input');
    const voice = document.getElementById('voice');
    const status = document.getElementById('status');
    let recorder = null, stream = null, chunks = [], busy = false, recording = false;
    function setStatus(t){ status.textContent = t || ''; }
    async function speakReply(reply){ try { await window.clawdVoice.speak(reply); } catch {} }
    async function sendText(){
      const text = String(input.value||'').trim(); if(!text || busy) return; busy = true; setStatus('收到中…');
      input.value='';
      try {
        const result = await window.clawdVoice.previewReply(text);
        setStatus(result?.reply || '我在呢。');
        if (result?.reply) await speakReply(result.reply);
      } catch(e){ setStatus('刚刚没接好'); }
      busy = false;
    }
    async function toggleVoice(){
      if (busy) return;
      if (recording && recorder) { recorder.stop(); setStatus('收到，正在转写…'); return; }
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = []; recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (e)=>{ if(e.data && e.data.size>0) chunks.push(e.data); };
        recorder.onstop = async ()=>{
          recording = false; voice.textContent = '🎙 语音';
          try {
            const blob = new Blob(chunks, { type: recorder?.mimeType || 'audio/webm' });
            const buffer = await blob.arrayBuffer();
            const bytes = new Uint8Array(buffer); let binary=''; for (let i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
            const base64 = btoa(binary);
            const t = await window.clawdVoice.transcribeAudioBuffer(base64, 'webm');
            const text = String(t?.text||'').trim();
            if (text) { input.value = text; setStatus(text); await sendText(); } else setStatus('没听清，再说一次');
          } catch(e){ setStatus('录音没接好'); }
          if (stream) { stream.getTracks().forEach(t=>t.stop()); stream = null; }
          recorder = null; chunks = [];
        };
        recorder.start(); recording = true; voice.textContent = '■ 结束'; setStatus('在听，点一下结束');
      } catch(e){ setStatus('麦克风没开'); }
    }
    voice.addEventListener('click', toggleVoice);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') sendText(); });
  </script>
</body>
</html>
